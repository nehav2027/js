<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: COLOR CHANGER</title>
    <style>
    .button {
        height: 100px;
        width: 100px;
        border: 2px solid black;
        display: inline-block;
        margin: 10px;
        cursor: pointer;
        text-align: center;
        
    }

    #green {
        background-color: green;
        
    }

    #yellow {
        background-color: yellow;
    }

    #orange {
        background-color: orange;
    }

    #blue {
        background-color: blue;
    }
</style>
</head>
<body>
    <nav>
        <a href="/" aria-current="page">Home</a>
        <a target="_blank"  href="https://www.youtube.com/@chaiaurcode">Youtube Channel</a>
    </nav>
    <div class="canvas">
        <h1>Color Scheme Switcher</h1>

        <span class="button" id="green">GREEN</span>
        <span class="button" id="yellow">YELLOW</span>
        <span class="button" id="orange">ORANGE</span>
        <span class="button" id="blue">BLUE</span>

        <h2>Try clicking on any of the color above
            <span>to change the background color of this page!</span>
        </h2>


    </div>
<script src="chaiaurcode.js"></script>
</body>
</html>
